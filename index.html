<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body {
  margin: 0;
  padding: 0;
  background: #fff;
  font-family: monospace;
  font-size: 14px;
  line-height: 1.4;
}

#book {
  padding: 2px;
  white-space: pre-wrap;
}
</style>

<script>

var d = [
"первый premier",
"второй deuxieme",
"третий troisieme",
"четвертый quatrieme",
"пятый cinquieme",
"шестой sixieme",
"седьмой septieme",
"восьмой huitieme",
"девятый neuvieme",
"десятый dixieme",
"дробь fraction",
"одна вторая un demi",
"одна третья un tiers",
"одна четвертая un quart"
];

var n = 0;

function next() {

n = Math.floor(Math.random() * d.length);

var a = d[n].split(" ");

document.getElementById("q").innerHTML = a[0];

document.getElementById("a").value = "";

document.getElementById("r").innerHTML = "";

}

function check() {

var t = d[n];

var p = t.indexOf(" ");

var ans = t.substring(p + 1);

var v = document.getElementById("a").value;

if(v == ans) {
document.getElementById("r").innerHTML = "ok";
}
else {
document.getElementById("r").innerHTML = ans;
}

}

</script>

</head>

<body onload="next()">

<div id="q"></div>

<input id="a">

<button onclick="check()">ok</button>

<button onclick="next()">next</button>

<div id="r"></div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
body {
  margin: 0;
  padding: 0;
  background: #fff;
  font-family: monospace;
  font-size: 14px;
  line-height: 1.4;
}

#book {
  padding: 2px;
  white-space: pre-wrap;
}
</style>

<script>

var t6 = [
"первый premier",
"второй deuxieme",
"третий troisieme",
"четвертый quatrieme",
"пятый cinquieme",
"шестой sixieme",
"седьмой septieme",
"восьмой huitieme",
"девятый neuvieme",
"десятый dixieme"
];

var t7 = [
"дробь fraction",
"одна вторая un demi",
"одна третья un tiers",
"одна четвертая un quart"
];

var d = t6;

var n = 0;

function topic() {

var v = document.getElementById("t").value;

if(v == "6") d = t6;
if(v == "7") d = t7;

next();

}

function next() {

n = Math.floor(Math.random() * d.length);

var s = d[n];

var p = s.indexOf(" ");

document.getElementById("q").innerHTML =
s.substring(0,p);

document.getElementById("a").value = "";

document.getElementById("r").innerHTML = "";

}

function check() {

var s = d[n];

var p = s.indexOf(" ");

var ans = s.substring(p + 1);

var v = document.getElementById("a").value;

if(v == ans) {
document.getElementById("r").innerHTML = "ok";
}
else {
document.getElementById("r").innerHTML = ans;
}

}

</script>

</head>

<body onload="topic()">

<select id="t" onchange="topic()">
<option value="6">6</option>
<option value="7">7</option>
</select>

<div id="q"></div>

<input id="a">

<button onclick="check()">ok</button>

<button onclick="next()">next</button>

<div id="r"></div>

</body>
</html>
